name: daily-prices

on:
  schedule:
    - cron: "30 22 * * 1-5"   # หลังปิดตลาด US ทุกวันทำการ = 05:30 เช้าเวลาไทย
  workflow_dispatch: {}        # ปุ่มกดรันเองใน Actions

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas
      - run: python scripts/fetch_prices.py
      - name: commit data
        run: |
          git config user.name "price-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "prices $(date -u +%F)"
          git push
